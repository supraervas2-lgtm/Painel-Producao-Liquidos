<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supra Ervas - Painel de Controle de Produção Líquidos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,800&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ==== Base escura (Amargun) — tom médio, mais claro que a versão anterior ==== */
  --preto:#101B13;
  --preto-2:#16261A;
  --painel:#1E3226;
  --painel-2:#18281D;
  --cinza-200:#345040;
  --cinza-100:#24392B;
  --creme:#F1F6EE;
  --cinza-600:#A8BFA0;
  --cinza-400:#7C9270;
  --dourado:#FFC94D;
  --dourado-2:#FFDD8A;

  /* ==== Cor viva por etapa (o "espectro" do líquido) ==== */
  --hall:#FFC94D;
  --et1:#3ED6FF;   /* Fracionamento/Separação/Pesagem */
  --et2:#B57BFF;   /* Mistura em Tanques */
  --et3:#FF9645;   /* Envase */
  --et4:#FFE066;   /* Rotulagem */
  --et5:#62E39B;   /* Embalagem */
  --final:#8CFF6F; /* Finalizadas */

  --sombra: 0 1px 3px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
  --sombra-hover: 0 10px 22px rgba(0,0,0,.4);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;font-family:'Work Sans',Arial,sans-serif;
  background:
    repeating-linear-gradient(135deg, rgba(255,201,77,.025) 0px, rgba(255,201,77,.025) 2px, transparent 2px, transparent 26px),
    var(--preto-2);
  color:var(--creme);
  overflow:hidden;
  display:flex;flex-direction:column;
}
h1,h2,.op-num,.pipe-step,.etapa-titulo{font-family:'Fraunces',Georgia,serif;}

/* ===== HEADER ===== */
header{
  position:relative;overflow:hidden;
  background:
    repeating-linear-gradient(125deg, rgba(255,201,77,.06) 0px, rgba(255,201,77,.06) 3px, transparent 3px, transparent 34px),
    linear-gradient(120deg,var(--preto),#13251a 55%,#1d4a2e);
  color:#fff;padding:18px 28px 16px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  border-bottom:2px solid var(--dourado);
}
header .titulo{display:flex;align-items:center;gap:14px;}
header .selo{
  width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,var(--dourado-2),var(--dourado) 70%);
  display:flex;align-items:center;justify-content:center;font-size:21px;
  box-shadow:0 0 18px rgba(255,201,77,.45);
}
header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;text-shadow:0 0 14px rgba(255,201,77,.3);}
header p{margin:4px 0 0;font-size:12px;opacity:.85;color:var(--dourado-2);font-family:'Work Sans';}
.upload-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.upload-btn,.refresh-btn{
  background:var(--dourado);color:#241705;padding:9px 16px;border-radius:999px;
  font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:0 0 16px rgba(255,201,77,.4);transition:.15s;border:2px solid var(--dourado-2);
}
.upload-btn:hover,.refresh-btn:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(255,201,77,.6);}
.refresh-btn{background:transparent;color:#fff;border-color:rgba(255,255,255,.3);box-shadow:none;}
.refresh-btn:hover{background:rgba(255,255,255,.08);box-shadow:none;}
#arquivoInput{display:none;}
.upload-status{font-size:11.5px;color:#fff;opacity:.9;max-width:260px;}

/* ===== PIPELINE RIBBON ===== */
.pipeline-bar{
  background:var(--painel-2);padding:12px 22px;
  display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;
  border-bottom:2px solid var(--cinza-200);
}
.pipe-step{
  display:flex;align-items:center;gap:6px;padding:6px 13px;
  border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em;
  border:1.5px solid;white-space:nowrap;font-family:'Work Sans';
  background:rgba(255,255,255,.03);
}
.pipe-arrow{color:#33452f;font-size:14px;}
.pipe-cnt{
  display:inline-block;background:rgba(255,255,255,.1);border-radius:999px;
  padding:1px 7px;font-size:10.5px;font-weight:800;
}

/* ===== BOARD ===== */
main{padding:14px 18px;flex:1;min-height:0;display:flex;}
.board-grid{
  display:grid;gap:12px;width:100%;min-height:0;
  grid-template-columns: minmax(190px,1fr) minmax(220px,1.25fr) minmax(220px,1.25fr) minmax(190px,1fr) minmax(190px,1fr);
}

.coluna{
  background:var(--painel);border:1px solid var(--cinza-200);border-radius:14px;box-shadow:var(--sombra);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.coluna-dupla{
  display:flex;flex-direction:column;gap:12px;min-height:0;
}
.coluna-dupla .coluna{flex:1;min-height:0;}
.coluna-header{
  padding:10px 13px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid;flex:none;
}
.coluna-header .rotulo{display:flex;flex-direction:column;gap:1px;min-width:0;}
.coluna-header .etapa-titulo{font-size:12.5px;font-weight:700;color:var(--creme);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.coluna-header .etapa-sub{font-size:9px;color:var(--cinza-400);text-transform:uppercase;letter-spacing:.05em;font-family:'Work Sans';}
.contador{background:rgba(255,255,255,.08);border-radius:999px;padding:2px 9px;font-size:11.5px;font-weight:800;color:var(--creme);flex:none;margin-left:6px;}

.cartoes{padding:9px;display:flex;flex-direction:column;gap:8px;flex:1;min-height:0;overflow-y:auto;}
.cartoes::-webkit-scrollbar{width:6px;}
.cartoes::-webkit-scrollbar-thumb{background:var(--cinza-200);border-radius:6px;}
.cartoes::-webkit-scrollbar-track{background:transparent;}
.vazio{text-align:center;color:var(--cinza-400);font-size:11px;padding:14px 8px;border:1.5px dashed var(--cinza-200);border-radius:9px;font-family:'Work Sans';}

/* ===== CARTÕES ===== */
.cartao{
  background:var(--cinza-100);border:1px solid var(--cinza-200);border-left:4px solid;border-radius:9px;
  padding:9px 10px;transition:.15s;box-shadow:var(--sombra);flex:none;
}
.cartao:hover{box-shadow:var(--sombra-hover);transform:translateY(-1px);}
.cartao .linha-topo{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px;}
.cartao .op-num{font-weight:800;font-size:12.5px;letter-spacing:.2px;}
.cartao .data-emissao{font-size:9.5px;color:var(--cinza-400);white-space:nowrap;font-family:'Work Sans';}
.cartao .descricao{font-weight:600;font-size:11px;margin-bottom:5px;color:var(--creme);font-family:'Work Sans';line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cartao .meta{display:flex;justify-content:space-between;font-size:9.5px;color:var(--cinza-600);margin-bottom:7px;font-family:'Work Sans';}
.cartao .meta b{color:var(--creme);font-weight:700;}
.badge-etapa-real{
  display:inline-block;font-size:8.5px;font-weight:800;padding:1px 7px;border-radius:999px;
  color:#0A140D;margin-bottom:5px;font-family:'Work Sans';
}

/* Barra "nível de garrafa" — muda de cor por etapa */
.nivel-garrafa{margin-bottom:7px;}
.nivel-legenda{display:flex;justify-content:space-between;font-size:8.5px;color:var(--cinza-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;font-family:'Work Sans';font-weight:700;}
.nivel-trilho{height:6px;border-radius:999px;background:var(--cinza-200);overflow:hidden;}
.nivel-liquido{height:100%;border-radius:999px;}

.btn{width:100%;border:none;border-radius:7px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;text-align:center;text-decoration:none;display:block;box-sizing:border-box;font-family:'Work Sans';letter-spacing:.02em;}
.btn-avancar{background:var(--dourado);color:#241705;}
.btn-avancar:hover{box-shadow:0 0 14px rgba(255,201,77,.5);}
.btn-registrar{color:#0A140D;}
.btn-registrar:hover{filter:brightness(1.1);}
.btn-devolver{width:100%;border:1.5px solid var(--cinza-200);border-radius:7px;padding:5px 9px;font-size:10px;font-weight:600;cursor:pointer;background:transparent;color:var(--cinza-600);margin-top:5px;font-family:'Work Sans';}
.btn-devolver:hover{border-color:var(--dourado);color:var(--dourado);}
.tag-concluida{display:inline-flex;align-items:center;gap:4px;background:rgba(140,255,111,.14);color:var(--final);font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;font-family:'Work Sans';}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dourado);color:#241705;padding:12px 20px;border-radius:9px;font-size:13px;font-weight:700;box-shadow:0 0 24px rgba(255,201,77,.5);display:none;z-index:100;}
</style>
</head>
<body>

<header>
  <div class="titulo">
    <div class="selo">🌿</div>
    <div>
      <h1>Supra Ervas - Painel de Controle de Produção Líquidos</h1>
      <p id="subtituloEtapas">Carregando etapas...</p>
    </div>
  </div>
  <div class="upload-area">
    <label class="upload-btn" for="arquivoInput">📤 Importar Relatório_OP_Aberto.xlsx</label>
    <input type="file" id="arquivoInput" accept=".csv,.xlsx,.xls" onchange="importarArquivo(event)">
    <button class="refresh-btn" onclick="carregarDoSheet()">🔄 Atualizar agora</button>
    <span class="upload-status" id="uploadStatus"></span>
  </div>
</header>

<div class="pipeline-bar" id="pipelineBar" style="flex:none;"></div>

<main>
  <div class="board-grid" id="boardScroll"></div>
</main>

<div class="toast" id="toast"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxlmYUWNLX0gtiV3dAfPw1G1vZt9IVru_0cZhg9o_QP-OUmmFMFTQqg7vPGK5f_GSw4/exec';
const FORM_URL   = 'https://supraervas2-lgtm.github.io/formulario-liquidos/';

let hall = [], emProducao = [], finalizadas = [];
let etapasGrupos = [
  ['Fracionamento','Separação','Pesagem'],
  ['Mistura em Tanques'],
  ['Envase'],
  ['Rotulagem'],
  ['Embalagem']
];
const ICONE_GRUPO = ['⚖️','🌀','🧴','🏷️','📦'];
// Cores vivas — uma por etapa, como um espectro que o líquido atravessa
const COR_GRUPO   = ['var(--et1)','var(--et2)','var(--et3)','var(--et4)','var(--et5)'];
const COR_GRUPO_HEX = ['#3ED6FF','#B57BFF','#FF9645','#FFE066','#62E39B'];

/* ── Utilidades ── */
function normalizar(txt){ return String(txt||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }
function limparTexto(v){ if(v===null||v===undefined) return ''; return String(v).trim().replace(/^"+|"+$/g,'').trim(); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return String(s??'').replace(/'/g,"\\'"); }
function indiceDoGrupo(etapaAtual){
  for(let i=0;i<etapasGrupos.length;i++){ if(etapasGrupos[i].includes(etapaAtual)) return i; }
  return -1;
}
function rotuloGrupo(i){ return etapasGrupos[i] ? etapasGrupos[i][0] : ''; }

/* ── Carregar dados ── */
async function carregarDoSheet(){
  try{
    const resp = await fetch(SHEETS_URL + '?t=' + Date.now(), { cache:'no-store' });
    const data = await resp.json();
    if(data.status === 'ok'){
      hall        = data.hall       || [];
      emProducao  = data.emProducao || [];
      finalizadas = data.finalizadas|| [];
      if(data.etapasGrupos && data.etapasGrupos.length) etapasGrupos = data.etapasGrupos;
      document.getElementById('subtituloEtapas').textContent =
        'Hall → ' + etapasGrupos.map(g=>g[0]).join(' → ') + ' → Finalizadas · dados em tempo real';
      renderTudo();
    }
  } catch(e){ console.error(e); }
}

async function postAcao(body){
  await fetch(SHEETS_URL, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
}

/* ══════════════════════════════════════════════════════════
   FILTRO DE IMPORTAÇÃO (mesma lógica do Apps Script)
   Situação = Não Finalizado · Empresa = 2 ·
   Grupo Produto = 'Produtos Acabados de Linha' ·
   Subgrupo Produto = 'P.A. Líquidos'
   ══════════════════════════════════════════════════════════ */
const GRUPO_PRODUTO_ALVO    = 'Produtos Acabados de Linha';
const SUBGRUPO_PRODUTO_ALVO = 'P.A. Líquidos';

function validarColunasRelatorio(headerRow){
  const norm = headerRow.map(h=>normalizar(h));
  return ['empresa','codigo','grupo produto','subgrupo produto'].every(c=>norm.includes(c));
}
function extrairDoRelatorioOP(rows){
  const header = rows[0].map(h=>normalizar(h));
  const idx = n => header.indexOf(normalizar(n));
  const iSituacao=idx('situacao'),iEmpresa=idx('empresa'),iCodigo=idx('codigo'),iData=idx('data'),
        iQtde=idx('quantidade'),iCodProduto=idx('cod. produto'),iDescricao=idx('descricao'),
        iGrupoProduto=idx('grupo produto'),iSubgrupoProduto=idx('subgrupo produto');
  const vistos=new Set(), novas=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r||!r[iCodigo]) continue;
    if(!normalizar(r[iSituacao]).includes('nao finalizad')) continue;
    if(String(r[iEmpresa]).trim()!=='2') continue;
    if(normalizar(r[iGrupoProduto])!==normalizar(GRUPO_PRODUTO_ALVO)) continue;
    if(normalizar(r[iSubgrupoProduto])!==normalizar(SUBGRUPO_PRODUTO_ALVO)) continue;
    const codigo=limparTexto(r[iCodigo]);
    if(!codigo||vistos.has(codigo)) continue;
    vistos.add(codigo);
    novas.push({ op:codigo, dataEmissao:limparTexto(r[iData]), codProduto:String(r[iCodProduto]??'').trim(),
      descricao:limparTexto(r[iDescricao]), qtde:String(r[iQtde]??'').trim(), cliente:'', familia:'' });
  }
  return novas;
}

async function importarArquivo(event){
  const file=event.target.files[0];
  if(!file) return;
  const status=document.getElementById('uploadStatus');
  status.textContent='Lendo '+file.name+'...';
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,dateNF:'dd/mm/yyyy'});
      if(rows.length<2){ status.textContent='⚠️ Arquivo vazio.'; return; }
      if(!validarColunasRelatorio(rows[0])){ status.textContent='⚠️ Arquivo inválido.'; return; }
      const existentes=new Set([...hall,...emProducao,...finalizadas].map(o=>limparTexto(o.op)));
      const novasOps=extrairDoRelatorioOP(rows).filter(o=>o.op&&!existentes.has(o.op));
      if(novasOps.length===0){ status.textContent='Nenhuma OP nova encontrada.'; return; }
      status.textContent=`Enviando ${novasOps.length} OP(s)...`;
      await postAcao({ acao:'importar_hall', ops:novasOps });
      status.textContent=`✅ ${novasOps.length} OP(s) importada(s).`;
      carregarDoSheet();
    }catch(err){ console.error(err); status.textContent='⚠️ Erro ao ler arquivo.'; }
  };
  reader.readAsArrayBuffer(file);
  event.target.value='';
}

/* ── Ações ── */
async function iniciarProducao(opNum){
  mostrarToast('▶ Movendo para produção...');
  await postAcao({ acao:'iniciar_producao', op:opNum });
  setTimeout(carregarDoSheet, 1500);
}
async function devolverHall(opNum){
  mostrarToast('↩ Devolvendo ao Hall...');
  await postAcao({ acao:'devolver_hall', op:opNum });
  setTimeout(carregarDoSheet, 1500);
}
function mostrarToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

/* ── Renderização ── */
function renderTudo(){
  const porGrupo = etapasGrupos.map(() => []);
  emProducao.forEach(o => {
    let idx = indiceDoGrupo(o.etapa);
    if(idx === -1) idx = 0;
    porGrupo[idx].push(o);
  });
  renderPipelineBar(porGrupo);
  renderBoard(porGrupo);
}

function renderPipelineBar(porGrupo){
  const el = document.getElementById('pipelineBar');
  let html = `<div class="pipe-step" style="border-color:var(--hall);color:var(--hall);">📋 Hall <span class="pipe-cnt">${hall.length}</span></div><div class="pipe-arrow">›</div>`;
  etapasGrupos.forEach((g, i) => {
    const cor = COR_GRUPO[i % COR_GRUPO.length];
    html += `<div class="pipe-step" style="border-color:${cor};color:${cor};">${ICONE_GRUPO[i%ICONE_GRUPO.length]} ${escapeHtml(rotuloGrupo(i))} <span class="pipe-cnt">${porGrupo[i].length}</span></div><div class="pipe-arrow">›</div>`;
  });
  html += `<div class="pipe-step" style="border-color:var(--final);color:var(--final);">✅ Finalizadas <span class="pipe-cnt">${finalizadas.length}</span></div>`;
  el.innerHTML = html;
}

function renderColunaEtapa(i, porGrupo){
  const grupo = etapasGrupos[i];
  const cor = COR_GRUPO[i % COR_GRUPO.length];
  const corHex = COR_GRUPO_HEX[i % COR_GRUPO_HEX.length];
  const icone = ICONE_GRUPO[i % ICONE_GRUPO.length];
  const lista = porGrupo[i];
  return `<div class="coluna">
      <div class="coluna-header" style="background:${corHex}18;border-color:${cor};">
        <div class="rotulo"><span class="etapa-titulo">${icone} ${escapeHtml(rotuloGrupo(i))}</span><span class="etapa-sub">Etapa ${i+1} de ${etapasGrupos.length}</span></div>
        <span class="contador">${lista.length}</span>
      </div>
      <div class="cartoes">
        ${lista.length ? lista.map(o => `
          <div class="cartao" style="border-left-color:${cor};">
            ${grupo.length > 1 ? `<span class="badge-etapa-real" style="background:${cor};">${escapeHtml(o.etapa)}</span>` : ''}
            <div class="linha-topo"><span class="op-num" style="color:${cor};">OP ${escapeHtml(o.op)}</span><span class="data-emissao">${escapeHtml(o.dataEmissao)}</span></div>
            <div class="descricao">${escapeHtml(o.descricao||'(sem descrição)')}</div>
            <div class="nivel-garrafa">
              <div class="nivel-legenda"><span>Progresso</span><span>${i+1}/${etapasGrupos.length}</span></div>
              <div class="nivel-trilho"><div class="nivel-liquido" style="width:${Math.round(((i+1)/etapasGrupos.length)*100)}%;background:${cor};"></div></div>
            </div>
            <div class="meta"><span>Cód. <b>${escapeHtml(o.codProduto)}</b></span><span>Qtde <b>${escapeHtml(o.qtde)}</b></span></div>
            <a class="btn btn-registrar" style="background:${cor};" href="${FORM_URL}" target="_blank">📋 Registrar ${escapeHtml(rotuloGrupo(i))}</a>
            <button class="btn-devolver" onclick="devolverHall('${escapeAttr(o.op)}')">↩ Devolver ao Hall</button>
          </div>`).join('') : `<div class="vazio">Nenhuma OP em ${escapeHtml(rotuloGrupo(i))}.</div>`}
      </div>
    </div>`;
}

function renderBoard(porGrupo){
  const el = document.getElementById('boardScroll');
  let html = '';

  // HALL
  html += `<div class="coluna">
    <div class="coluna-header" style="background:rgba(255,201,77,.08);border-color:var(--hall);">
      <div class="rotulo"><span class="etapa-titulo">Hall das OPs</span><span class="etapa-sub">Aguardando início</span></div>
      <span class="contador">${hall.length}</span>
    </div>
    <div class="cartoes">
      ${hall.length ? hall.map(o => `
        <div class="cartao" style="border-left-color:var(--hall);">
          <div class="linha-topo"><span class="op-num" style="color:var(--hall);">OP ${escapeHtml(o.op)}</span><span class="data-emissao">${escapeHtml(o.dataEmissao)}</span></div>
          <div class="descricao">${escapeHtml(o.descricao||'(sem descrição)')}</div>
          <div class="meta"><span>Cód. <b>${escapeHtml(o.codProduto)}</b></span><span>Qtde <b>${escapeHtml(o.qtde)}</b></span></div>
          <button class="btn btn-avancar" onclick="iniciarProducao('${escapeAttr(o.op)}')">▶ Iniciar Produção</button>
        </div>`).join('') : '<div class="vazio">Nenhuma OP pendente.<br>Importe um arquivo acima.</div>'}
    </div>
  </div>`;

  // ETAPAS — layout especial de 2 colunas duplas quando há exatamente 5 etapas
  // (Etapa 1 em cima / Etapa 3 embaixo · Etapa 2 em cima / Etapa 4 embaixo · Etapa 5 sozinha)
  if(etapasGrupos.length === 5){
    html += `<div class="coluna-dupla">${renderColunaEtapa(0,porGrupo)}${renderColunaEtapa(2,porGrupo)}</div>`;
    html += `<div class="coluna-dupla">${renderColunaEtapa(1,porGrupo)}${renderColunaEtapa(3,porGrupo)}</div>`;
    html += renderColunaEtapa(4,porGrupo);
  } else {
    // fallback: uma coluna por etapa, em linha (caso a sequência de etapas mude no futuro)
    etapasGrupos.forEach((g,i) => { html += renderColunaEtapa(i,porGrupo); });
  }

  // FINALIZADAS
  html += `<div class="coluna">
    <div class="coluna-header" style="background:rgba(140,255,111,.08);border-color:var(--final);">
      <div class="rotulo"><span class="etapa-titulo">✅ Finalizadas</span><span class="etapa-sub">Hoje</span></div>
      <span class="contador">${finalizadas.length}</span>
    </div>
    <div class="cartoes">
      ${finalizadas.length ? finalizadas.slice().reverse().map(o => `
        <div class="cartao" style="border-left-color:var(--final);">
          <div class="linha-topo"><span class="op-num" style="color:var(--final);">OP ${escapeHtml(o.op)}</span><span class="tag-concluida">✔ Concluída</span></div>
          <div class="descricao">${escapeHtml(o.produto||'(sem descrição)')}</div>
          <div class="meta"><span>Produzido <b>${escapeHtml(o.produzido)}</b></span><span>Perda <b>${escapeHtml(o.perda_processo||'0')}</b></span></div>
        </div>`).join('') : '<div class="vazio">Nenhuma OP finalizada hoje.</div>'}
    </div>
  </div>`;

  el.innerHTML = html;
}

/* ── Init ── */
carregarDoSheet();
setInterval(carregarDoSheet, 20000);
</script>
</body>
</html>
